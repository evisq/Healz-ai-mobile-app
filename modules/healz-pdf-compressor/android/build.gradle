plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.healzpdfcompressor'
version = '0.1.0'

android {
  namespace "expo.modules.healzpdfcompressor"

  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }

  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation 'com.tom-roush:pdfbox-android:2.0.27.0'
}
